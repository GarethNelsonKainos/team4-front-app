name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Quality Checks & Tests
    runs-on: ubuntu-latest

    steps:
     - uses: actions/checkout@v5
    
     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
         node-version: '20'
         cache: 'npm'
    
     - name: Install dependencies
       run: npm ci
    
     - name: Run Biome checks
       run: npm run ci:check
    
     - name: Build TypeScript & CSS in parallel
       run: npm run build & npm run build-css-prod & wait
    
     - name: Run tests with coverage
       run: npm run test:coverage

     - name: Upload coverage report
       uses: actions/upload-artifact@v4
       with:
         name: coverage-report
         path: output/test/
         retention-days: 5

     - name: Start application server & run accessibility tests
       run: |
         npm run dev > /tmp/server.log 2>&1 &
         SERVER_PID=$!
         echo $SERVER_PID > server.pid
         
         # Wait for server with faster polling
         timeout 30 bash -c 'until curl -s http://localhost:3000 > /dev/null 2>&1; do sleep 1; done' || { kill $SERVER_PID 2>/dev/null; exit 1; }
         
         # Run Pa11y tests (JSON + exit code, no duplicate run)
         npx pa11y-ci --json > output/accessibility/pa11y-results.json 2>&1 || true
         
         # Clean up
         kill $SERVER_PID 2>/dev/null || true

     - name: Process accessibility results
       if: always()
       run: |
         if [ -f output/accessibility/pa11y-results.json ]; then
           echo "=== Pa11y Test Results ===" 
           cat output/accessibility/pa11y-results.json | jq '.[] | "\(.pageUrl): \(.issues | length) issues"' 2>/dev/null || cat output/accessibility/pa11y-results.json
           EXIT_CODE=$(jq '[.[] | .issues | length] | add' output/accessibility/pa11y-results.json 2>/dev/null || echo "0")
           if [ "$EXIT_CODE" != "0" ]; then
             echo "❌ Accessibility issues found"
             exit 1
           fi
         fi

     - name: Generate & upload accessibility report
       if: always()
       run: |
         mkdir -p output/accessibility
         node generate-a11y-report.js output/accessibility/pa11y-results.json 2>/dev/null || echo "Report generation skipped"

     - name: Upload accessibility report
       if: always()
       uses: actions/upload-artifact@v4
       with:
         name: accessibility-report
         path: output/accessibility/
         retention-days: 5

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
     - uses: actions/checkout@v5

     - name: Set Docker image tag
       id: image_meta
       run: |
         echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
         echo "timestamp=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

     - name: Set up Docker Buildx
       uses: docker/setup-buildx-action@v3

     - name: Login to Azure Container Registry
       if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && github.event_name == 'push'
       uses: docker/login-action@v3
       with:
         registry: ${{ secrets.ACR_LOGIN_SERVER }}
         # Use either admin credentials (ACR_ADMIN_USERNAME/PASSWORD) 
         # or service principal credentials (ACR_SERVICE_PRINCIPAL_ID/PASSWORD)
         username: ${{ secrets.ACR_ADMIN_USERNAME || secrets.ACR_SERVICE_PRINCIPAL_ID }}
         password: ${{ secrets.ACR_ADMIN_PASSWORD || secrets.ACR_SERVICE_PRINCIPAL_PASSWORD }}

     - name: Build Docker image with cache
       uses: docker/build-push-action@v5
       with:
         context: .
         tags: |
           team4-front-app:${{ steps.image_meta.outputs.short_sha }}
           team4-front-app:ci
           ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && format('{0}/team4-front-app:{1}', secrets.ACR_LOGIN_SERVER, steps.image_meta.outputs.short_sha) || '' }}
           ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && format('{0}/team4-front-app:latest', secrets.ACR_LOGIN_SERVER) || '' }}
           ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && format('{0}/team4-front-app:{1}', secrets.ACR_LOGIN_SERVER, steps.image_meta.outputs.timestamp) || '' }}
         cache-from: type=gha
         cache-to: type=gha,mode=max
         push: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && github.event_name == 'push' }}
         load: ${{ !((github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && github.event_name == 'push') }}

     - name: Verify Docker image (local builds)
       if: !((github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && github.event_name == 'push')
       run: docker image inspect team4-front-app:${{ steps.image_meta.outputs.short_sha }} > /dev/null && echo "✅ Image built successfully"

     - name: Verify ACR push (main or josh-terraform branch)
       if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && github.event_name == 'push'
       run: |
         echo "✅ Image pushed to ACR successfully"
         echo "📦 Image tags:"
         echo "  - ${{ secrets.ACR_LOGIN_SERVER }}/team4-front-app:${{ steps.image_meta.outputs.short_sha }}"
         echo "  - ${{ secrets.ACR_LOGIN_SERVER }}/team4-front-app:latest"
         echo "  - ${{ secrets.ACR_LOGIN_SERVER }}/team4-front-app:${{ steps.image_meta.outputs.timestamp }}"