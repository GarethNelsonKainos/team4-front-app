name: CI

on:
  push:
    branches: [ main, josh-terraform ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Quality Checks & Tests
    runs-on: ubuntu-latest

    steps:
     - uses: actions/checkout@v5
    
     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
         node-version: '20'
         cache: 'npm'
    
     - name: Install dependencies
       run: npm ci
    
     - name: Run Biome checks
       run: npm run ci:check
    
     - name: Build TypeScript & CSS in parallel
       run: npm run build & npm run build-css-prod & wait
    
     - name: Run tests with coverage
       run: npm run test:coverage

     - name: Upload coverage report
       uses: actions/upload-artifact@v4
       with:
         name: coverage-report
         path: output/test/
         retention-days: 5

     - name: Start application server & run accessibility tests
       run: |
         npm run dev > /tmp/server.log 2>&1 &
         SERVER_PID=$!
         echo $SERVER_PID > server.pid
         
         # Wait for server with faster polling
         timeout 30 bash -c 'until curl -s http://localhost:3000 > /dev/null 2>&1; do sleep 1; done' || { kill $SERVER_PID 2>/dev/null; exit 1; }
         
         # Run Pa11y tests (JSON + exit code, no duplicate run)
         npx pa11y-ci --json > output/accessibility/pa11y-results.json 2>&1 || true
         
         # Clean up
         kill $SERVER_PID 2>/dev/null || true

     - name: Process accessibility results
       if: always()
       run: |
         if [ -f output/accessibility/pa11y-results.json ]; then
           echo "=== Pa11y Test Results ===" 
           cat output/accessibility/pa11y-results.json | jq '.[] | "\(.pageUrl): \(.issues | length) issues"' 2>/dev/null || cat output/accessibility/pa11y-results.json
           EXIT_CODE=$(jq '[.[] | .issues | length] | add' output/accessibility/pa11y-results.json 2>/dev/null || echo "0")
           if [ "$EXIT_CODE" != "0" ]; then
             echo "❌ Accessibility issues found"
             exit 1
           fi
         fi

     - name: Generate & upload accessibility report
       if: always()
       run: |
         mkdir -p output/accessibility
         node generate-a11y-report.js output/accessibility/pa11y-results.json 2>/dev/null || echo "Report generation skipped"

     - name: Upload accessibility report
       if: always()
       uses: actions/upload-artifact@v4
       with:
         name: accessibility-report
         path: output/accessibility/
         retention-days: 5

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
     - uses: actions/checkout@v5

     - name: Set Docker image tag
       id: image_meta
       run: |
         echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
         echo "timestamp=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

     - name: Set up Docker Buildx
       uses: docker/setup-buildx-action@v3

     - name: Login to Azure Container Registry
       if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && github.event_name == 'push'
       uses: docker/login-action@v3
       with:
         registry: ${{ secrets.ACR_LOGIN_SERVER_JOSH }}
         # Use either admin credentials (ACR_ADMIN_USERNAME/PASSWORD) 
         # or service principal credentials (ACR_SERVICE_PRINCIPAL_ID/PASSWORD)
         username: ${{ secrets.ACR_ADMIN_USERNAME_JOSH || secrets.ACR_SERVICE_PRINCIPAL_ID_JOSH }}
         password: ${{ secrets.ACR_ADMIN_PASSWORD_JOSH || secrets.ACR_SERVICE_PRINCIPAL_PASSWORD_JOSH }}

     - name: Build and push Docker image to ACR
       if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && github.event_name == 'push' }}
       uses: docker/build-push-action@v5
       with:
         context: .
         tags: |
           ${{ format('{0}/team4-front-app:{1}', secrets.ACR_LOGIN_SERVER_JOSH, steps.image_meta.outputs.short_sha) }}
           ${{ format('{0}/team4-front-app:latest', secrets.ACR_LOGIN_SERVER_JOSH) }}
           ${{ format('{0}/team4-front-app:{1}', secrets.ACR_LOGIN_SERVER_JOSH, steps.image_meta.outputs.timestamp) }}
         cache-from: type=gha
         cache-to: type=gha,mode=max
         push: true

     - name: Build Docker image (local only)
       if: ${{ !((github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && github.event_name == 'push') }}
       uses: docker/build-push-action@v5
       with:
         context: .
         tags: |
           team4-front-app:${{ steps.image_meta.outputs.short_sha }}
           team4-front-app:ci
         cache-from: type=gha
         cache-to: type=gha,mode=max
         load: true

     - name: Verify Docker image (local builds)
       if: ${{ !((github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && github.event_name == 'push') }}
       run: docker image inspect team4-front-app:${{ steps.image_meta.outputs.short_sha }} > /dev/null && echo "✅ Image built successfully"

     - name: Verify ACR push (main or josh-terraform branch)
       if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && github.event_name == 'push' }}
       run: |
         echo "✅ Image pushed to ACR successfully"
         echo "📦 Image tags:"
         echo "  - ${{ secrets.ACR_LOGIN_SERVER_JOSH }}/team4-front-app:${{ steps.image_meta.outputs.short_sha }}"
         echo "  - ${{ secrets.ACR_LOGIN_SERVER_JOSH }}/team4-front-app:latest"
         echo "  - ${{ secrets.ACR_LOGIN_SERVER_JOSH }}/team4-front-app:${{ steps.image_meta.outputs.timestamp }}"

  terraform-validate:
    name: Terraform Validate & Format Check
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && github.event_name == 'push' }}
    env:
      TERRAFORM_VERSION: '1.5.0'
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_JOSH }}
      ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        working-directory: ./my-infrastructure
        run: terraform fmt -check -recursive

      - name: Terraform Init (for validation)
        working-directory: ./my-infrastructure
        run: |
          terraform init \
            -backend=false \
            -input=false

      - name: Terraform Validate
        working-directory: ./my-infrastructure
        run: terraform validate

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-validate
    permissions:
      contents: read
    if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && github.event_name == 'push' }}
    env:
      TERRAFORM_VERSION: '1.5.0'
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_JOSH }}
      ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
      TF_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ./my-infrastructure
        run: |
          terraform init \
            -input=false \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=joshstate" \
            -backend-config="key=${{ env.TF_ENVIRONMENT }}/team4.tfstate"

      - name: Terraform Plan
        working-directory: ./my-infrastructure
        run: |
          terraform plan \
            -var-file="${{ env.TF_ENVIRONMENT }}.tfvars" \
            -var="container_image_tag=latest" \
            -input=false \
            -out=tfplan \
            -lock=true

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ env.TF_ENVIRONMENT }}
          path: my-infrastructure/tfplan
          retention-days: 1

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    permissions:
      contents: read
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/josh-terraform') && github.event_name == 'push'
    env:
      TERRAFORM_VERSION: '1.5.0'
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_JOSH }}
      ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
      TF_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ env.TF_ENVIRONMENT }}
          path: ./my-infrastructure

      - name: Terraform Init
        working-directory: ./my-infrastructure
        run: |
          terraform init \
            -input=false \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=joshstate" \
            -backend-config="key=${{ env.TF_ENVIRONMENT }}/team4.tfstate"

      - name: Import Existing Resource Group (if present)
        working-directory: ./my-infrastructure
        run: |
          terraform import \
            -input=false \
            -var-file="${{ env.TF_ENVIRONMENT }}.tfvars" \
            module.resource_group.azurerm_resource_group.this \
            "/subscriptions/${{ env.ARM_SUBSCRIPTION_ID }}/resourceGroups/rg-team4-${{ env.TF_ENVIRONMENT }}" \
            || true

      - name: Terraform Apply
        working-directory: ./my-infrastructure
        run: terraform apply -input=false tfplan

      - name: Capture Outputs
        working-directory: ./my-infrastructure
        run: |
          echo "## Terraform Apply Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Applied Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resource Outputs" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          terraform output -json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Notify on Success
        run: |
          echo "✅ Infrastructure updated successfully on $(date)"
          echo "Environment: prod"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
