name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. latest or sha-abc1234)'
        required: false
        default: 'latest'
        type: string

jobs:
  test:
    name: Test & Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Biome checks
        run: npm run ci:check

      - name: Build TypeScript
        run: npm run build

      - name: Build CSS (Production)
        run: npm run build-css-prod

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Coverage report folder
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: output/test/

      - name: Create accessibility reports directory
        run: mkdir -p output/accessibility

      - name: Start application server
        run: |
          npm run dev &
          echo $! > server.pid
          sleep 10

      - name: Wait for server to be ready
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'

      - name: Run Pa11y accessibility tests
        id: pa11y
        run: |
          set +e
          npx pa11y-ci --json > output/accessibility/pa11y-results.json 2>&1
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit 0

      - name: Display Pa11y results
        if: always()
        run: |
          if [ -f output/accessibility/pa11y-results.json ]; then
            cat output/accessibility/pa11y-results.json
          fi

      - name: Generate HTML accessibility report
        if: always()
        run: |
          if [ -f output/accessibility/pa11y-results.json ]; then
            node generate-a11y-report.js output/accessibility/pa11y-results.json || echo "Failed to generate report"
          else
            echo "No Pa11y results found"
          fi

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: output/accessibility/

      - name: Fail build if accessibility tests failed
        if: steps.pa11y.outputs.exit_code != '0'
        run: |
          echo "❌ Accessibility tests failed. Please review the accessibility report artifact."
          exit 1

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags and registry
        id: image_meta
        run: |
          ACR_LOGIN_SERVER="${{ vars.ACR_LOGIN_SERVER_CAM || 'academyacrj3r5dv.azurecr.io' }}"
          IMAGE_NAME="${{ vars.ACR_REGISTRY_NAME_CAM || 'team4-front-app-cameron' }}"
          SHA_TAG="sha-${GITHUB_SHA::7}"
          
          # Tags for local build
          LOCAL_TAGS="local/team4-front-app:${SHA_TAG},local/team4-front-app:ci"
          
          # Tags for ACR (if on main or PR)
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # PR tags: pr-123, pr-123-sha-abcd1234
            PR_NUM="${{ github.event.pull_request.number }}"
            ACR_TAGS="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:pr-${PR_NUM},${ACR_LOGIN_SERVER}/${IMAGE_NAME}:pr-${PR_NUM}-${SHA_TAG}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            # Main branch tags: latest, sha-abcd1234, YYYY-MM-DD
            DATE_TAG=$(date -u +'%Y-%m-%d')
            ACR_TAGS="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:latest,${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${SHA_TAG},${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${DATE_TAG}"
          else
            # Other branches: branch-name, branch-name-sha-abcd1234
            BRANCH_NAME=$(echo "${GITHUB_REF#refs/heads/}" | sed 's/[^a-zA-Z0-9_.-]/-/g')
            ACR_TAGS="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${BRANCH_NAME},${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${BRANCH_NAME}-${SHA_TAG}"
          fi
          
          echo "acr_login_server=${ACR_LOGIN_SERVER}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "local_tags=${LOCAL_TAGS}" >> "$GITHUB_OUTPUT"
          echo "acr_tags=${ACR_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.image_meta.outputs.local_tags }}

      - name: Run Docker container (smoke test)
        run: |
          docker run -d --rm \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e API_BASE_URL=http://localhost:8080 \
            --name ci-frontend \
            local/team4-front-app:${{ steps.image_meta.outputs.sha_tag }}

      - name: Wait for container to be ready
        run: |
          set -e
          for i in {1..30}; do
            if curl -fsS http://localhost:3000; then
              exit 0
            fi
            sleep 2
          done
          echo "Container did not become ready"
          docker logs ci-frontend || true
          exit 1

      - name: Stop Docker container
        if: always()
        run: |
          docker stop ci-frontend || true

  push:
    name: Push to ACR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags and registry
        id: image_meta
        run: |
          ACR_LOGIN_SERVER="${{ vars.ACR_LOGIN_SERVER_CAM || 'academyacrj3r5dv.azurecr.io' }}"
          IMAGE_NAME="${{ vars.ACR_REGISTRY_NAME_CAM || 'team4-front-app-cameron' }}"
          SHA_TAG="sha-${GITHUB_SHA::7}"
          
          # Tags for ACR
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # PR tags: pr-123, pr-123-sha-abcd1234
            PR_NUM="${{ github.event.pull_request.number }}"
            ACR_TAGS="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:pr-${PR_NUM},${ACR_LOGIN_SERVER}/${IMAGE_NAME}:pr-${PR_NUM}-${SHA_TAG}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            # Main branch tags: latest, sha-abcd1234, YYYY-MM-DD
            DATE_TAG=$(date -u +'%Y-%m-%d')
            ACR_TAGS="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:latest,${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${SHA_TAG},${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${DATE_TAG}"
          else
            # Other branches: branch-name, branch-name-sha-abcd1234
            BRANCH_NAME=$(echo "${GITHUB_REF#refs/heads/}" | sed 's/[^a-zA-Z0-9_.-]/-/g')
            ACR_TAGS="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${BRANCH_NAME},${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${BRANCH_NAME}-${SHA_TAG}"
          fi
          
          echo "acr_login_server=${ACR_LOGIN_SERVER}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "acr_tags=${ACR_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Login to Azure Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: azure/docker-login@v1
        with:
          login-server: ${{ steps.image_meta.outputs.acr_login_server }}
          username: ${{ secrets.AZURE_CLIENT_ID_CAM }}
          password: ${{ secrets.AZURE_CLIENT_SECRET_CAM }}

      - name: Build and push to ACR (main branch)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          tags: ${{ steps.image_meta.outputs.acr_tags }}

      - name: Build and push to ACR (PR builds)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          tags: ${{ steps.image_meta.outputs.acr_tags }}

  terraform-plan:
    name: Terraform Plan (Dev)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      pull-requests: write
      issues: write
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Detect Terraform changes
        id: tf_changes
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/ci.yml'

      - name: Skip Terraform (no changes)
        if: github.event_name != 'workflow_dispatch' && steps.tf_changes.outputs.terraform != 'true'
        run: |
          echo "No Terraform-related changes detected. Skipping."
          exit 0

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5'

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_CAM }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET_CAM }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID_CAM }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_CAM }}
        run: |
          terraform init \
            -backend-config="resource_group_name=team4-front-tfstate-rg" \
            -backend-config="storage_account_name=t4frontcamerontfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=front-app-dev.tfstate"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_CAM }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET_CAM }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID_CAM }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_CAM }}
          TF_VAR_acr_username: ${{ secrets.AZURE_CLIENT_ID_CAM }}
          TF_VAR_acr_password: ${{ secrets.AZURE_CLIENT_SECRET_CAM }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          else
            DEPLOY_IMAGE_TAG="sha-${GITHUB_SHA::7}"
          fi

          terraform plan -no-color -input=false -lock=false \
            -var="environment=dev" \
            -var="acr_resource_group=rg-academy-acr" \
            -var="resource_group_name=team4-frontend-cameron-rg" \
            -var="dns_name_label=team4-frontend-cameron-$(date +%Y%m%d)" \
            -var="image_tag=${DEPLOY_IMAGE_TAG}" \
            -var="acr_login_server=academyacrj3r5dv.azurecr.io" \
            -var='environment_variables={"NODE_ENV":"production","PORT":"3000"}' \
            -out=tfplan
        continue-on-error: true

      - name: Upload Plan
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev
          path: terraform/tfplan
          retention-days: 5

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌 \`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️ \`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖 \`${{ steps.validate.outcome }}\`
            <details><summary>Validation Output</summary>

            \`\`\`
            ${{ steps.validate.outputs.stdout }}
            \`\`\`

            </details>

            #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  terraform-apply:
    name: Terraform Apply (Dev)
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5'
          terraform_wrapper: false

      - name: Terraform Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_CAM }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET_CAM }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID_CAM }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_CAM }}
        run: |
          terraform init \
            -backend-config="resource_group_name=team4-front-tfstate-rg" \
            -backend-config="storage_account_name=t4frontcamerontfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=front-app-dev.tfstate"

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-dev
          path: terraform

      - name: Terraform Apply
        id: apply
        env:
          TF_VAR_acr_username: ${{ secrets.AZURE_CLIENT_ID_CAM }}
          TF_VAR_acr_password: ${{ secrets.AZURE_CLIENT_SECRET_CAM }}
          TF_VAR_environment_variables: '{"NODE_ENV":"production","PORT":"3000"}'
        run: |
          terraform apply -auto-approve -input=false -lock=false tfplan

          # Capture outputs
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT
          echo "frontend_fqdn=$(terraform output -raw frontend_fqdn)" >> $GITHUB_OUTPUT

      - name: Display Deployment Info
        run: |
          echo "🚀 Deployment successful!"
          echo "📍 Frontend URL: ${{ steps.apply.outputs.frontend_url }}"
          echo "🌐 FQDN: ${{ steps.apply.outputs.frontend_fqdn }}"

      - name: Comment PR with Apply Result
        if: github.event_name == 'push'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### 🚀 Terraform Apply Successful (Dev)

            **Environment:** dev
            **Frontend URL:** ${{ steps.apply.outputs.frontend_url }}
            **FQDN:** ${{ steps.apply.outputs.frontend_fqdn }}

            *Applied by: @${{ github.actor }} from commit \`${context.sha.substring(0,7)}\`*`;

            // Find the most recent commit and comment on it
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: output
            })