name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Test and Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Biome checks
        run: npm run ci:check

      - name: Build TypeScript
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Coverage report folder
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: output/test/

      - name: Create accessibility reports directory
        run: mkdir -p output/accessibility

      - name: Start application server
        run: |
          npm run dev &
          echo $! > server.pid
          sleep 10

      - name: Wait for server to be ready
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'

      - name: Run Pa11y accessibility tests
        id: pa11y
        run: |
          set +e
          npx pa11y-ci --json > output/accessibility/pa11y-results.json 2>&1
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          npx pa11y-ci
          exit 0

      - name: Display Pa11y results
        if: always()
        run: |
          if [ -f output/accessibility/pa11y-results.json ]; then
            cat output/accessibility/pa11y-results.json
          fi

      - name: Generate HTML accessibility report
        if: always()
        run: |
          if [ -f output/accessibility/pa11y-results.json ]; then
            node generate-a11y-report.js output/accessibility/pa11y-results.json || echo "Failed to generate report"
          else
            echo "No Pa11y results found"
          fi

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: output/accessibility/

      - name: Fail build if accessibility tests failed
        if: steps.pa11y.outputs.exit_code != '0'
        run: |
          echo "❌ Accessibility tests failed. Please review the accessibility report artifact."
          exit 1

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Compute short Git SHA
        id: sha
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: team4-frontend:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-to-acr:
    name: Push Docker Image to ACR
    runs-on: ubuntu-latest
    needs: docker-build
    env:
      ACR_LOGIN_SERVER_BLAKE: ${{ secrets.ACR_LOGIN_SERVER_BLAKE }}
      ACR_USERNAME_BLAKE: ${{ secrets.ACR_USERNAME_BLAKE }}
      ACR_PASSWORD_BLAKE: ${{ secrets.ACR_PASSWORD_BLAKE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Compute short Git SHA
        id: sha
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER_BLAKE }}
          username: ${{ env.ACR_USERNAME_BLAKE }}
          password: ${{ env.ACR_PASSWORD_BLAKE }}

      - name: Build and push Docker image to ACR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER_BLAKE }}/team4-frontend:${{ env.SHORT_SHA }}

      - name: Verify image in ACR
        run: |
          echo "Image pushed: ${{ env.ACR_LOGIN_SERVER_BLAKE }}/team4-frontend:${{ env.SHORT_SHA }}"

  terraform-deploy:
    name: Terraform Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: push-to-acr
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_BLAKE }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET_BLAKE }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_BLAKE }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID_BLAKE }}
      # Terraform variables — TF_VAR_ prefix is picked up automatically
      TF_VAR_environment: dev
      TF_VAR_acr_name: ${{ secrets.ACR_USERNAME_BLAKE }}
      TF_VAR_acr_login_server: ${{ secrets.ACR_LOGIN_SERVER_BLAKE }}
      TF_VAR_frontend_image_tag: ${{ github.sha && format('{0}', github.sha) }}
      TF_VAR_backend_image_tag: latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute short Git SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Set image tags from short SHA
        run: |
          echo "TF_VAR_frontend_image_tag=$SHORT_SHA" >> $GITHUB_ENV
          echo "TF_VAR_backend_image_tag=$SHORT_SHA" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./my-infrastructure
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ./my-infrastructure
        run: terraform plan -input=false

      - name: Terraform Apply
        working-directory: ./my-infrastructure
        run: terraform apply -auto-approve -input=false
