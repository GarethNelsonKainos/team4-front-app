name: Terraform Plan & Apply

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'my-infrastructure/**'
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]
    branches: [ main, josh-terraform ]

env:
  TERRAFORM_VERSION: '1.5.0'
  # Environment for Azure authentication via service principal
  # These are set as GitHub secrets - see TERRAFORM_SETUP.md
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_JOSH }}
  ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
  # Determine environment based on branch
  TF_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

jobs:
  terraform-validate:
    name: Terraform Validate & Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Debug Azure auth env
        run: |
          missing=0
          for var in ARM_CLIENT_ID ARM_TENANT_ID ARM_CLIENT_SECRET ARM_SUBSCRIPTION_ID_JOSH; do
            if [ -z "${!var}" ]; then
              echo "Missing or empty: $var"
              missing=1
            else
              echo "Present: $var"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        working-directory: ./my-infrastructure
        run: terraform fmt -check -recursive

      - name: Terraform Init (for validation)
        working-directory: ./my-infrastructure
        run: |
          terraform init \
            -backend=false \
            -input=false

      - name: Terraform Validate
        working-directory: ./my-infrastructure
        run: terraform validate

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-validate
    permissions:
      contents: read
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ./my-infrastructure
        run: |
          terraform init \
            -input=false \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=terraform-state" \
            -backend-config="key=${{ env.TF_ENVIRONMENT }}/team4.tfstate"

      - name: Terraform Plan
        working-directory: ./my-infrastructure
        run: |
          terraform plan \
            -var-file="${{ env.TF_ENVIRONMENT }}.tfvars" \
            -input=false \
            -out=tfplan \
            -lock=true

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let comment = '## Terraform Plan Summary\n\n';
            comment += `**Environment:** \`${{ env.TF_ENVIRONMENT }}\`\n`;
            comment += `**Branch:** \`${{ github.head_ref }}\`\n\n`;
            
            // Try to run terraform show for a summary
            try {
              const { execSync } = require('child_process');
              const planSummary = execSync('cd my-infrastructure && terraform show -no-color tfplan 2>&1 | head -50').toString();
              comment += '```\n' + planSummary + '\n...\n```';
            } catch(e) {
              comment += '> Terraform plan generated. Check the logs for details.';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ env.TF_ENVIRONMENT }}
          path: my-infrastructure/tfplan
          retention-days: 1

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    permissions:
      contents: read
    # Only apply on main branch when pushed (not on PRs)
    if: >-
      ${{ github.ref == 'refs/heads/main' && github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-prod
          path: ./my-infrastructure

      - name: Terraform Init
        working-directory: ./my-infrastructure
        run: |
          terraform init \
            -input=false \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=terraform-state" \
            -backend-config="key=prod/team4.tfstate"

      - name: Terraform Apply
        working-directory: ./my-infrastructure
        run: terraform apply -input=false tfplan

      - name: Capture Outputs
        working-directory: ./my-infrastructure
        run: |
          echo "## Terraform Apply Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Applied Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resource Outputs" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          terraform output -json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Notify on Success
        run: |
          echo "✅ Infrastructure updated successfully on $(date)"
          echo "Environment: prod"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"

  terraform-cleanup:
    name: Cleanup Artifacts
    runs-on: ubuntu-latest
    needs: [ terraform-plan, terraform-apply ]
    if: always()
    
    steps:
      - name: Delete Artifacts After Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: geekyeggo/delete-artifact@v2
        with:
          name: terraform-plan-*
